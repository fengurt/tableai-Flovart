services:
  db:
    image: postgres:17-alpine
    container_name: flovart-db
    environment:
      POSTGRES_DB: flovart
      POSTGRES_USER: flovart
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flovart_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flovart"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
    container_name: flovart-server
    env_file: ./server/.env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - images:/data/flovart-images
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flovart-web
    ports:
      - "127.0.0.1:3217:80"
    restart: unless-stopped

volumes:
  pgdata:
  images:
